<div class="card">
    <app-page-header [title]="isEdit() ? 'Editar Refeição' : 'Nova Refeição'"></app-page-header>

    <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-1 md:col-span-2 flex flex-col gap-1">
            <label class="font-medium text-sm">Descrição *</label>
            <input pInputText formControlName="descricao"
                   placeholder="Ex: Café da Manhã" class="w-full" />
            @if (form.get('descricao')?.invalid && form.get('descricao')?.touched) {
                <small class="text-red-500">Descrição é obrigatória.</small>
            }
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Horário *</label>
            <p-datepicker formControlName="horario" [timeOnly]="true" hourFormat="24"
                          placeholder="HH:mm" styleClass="w-full" />
            @if (form.get('horario')?.invalid && form.get('horario')?.touched) {
                <small class="text-red-500">Horário é obrigatório.</small>
            }
        </div>
    </form>
</div>

<p-confirmDialog></p-confirmDialog>
