<div class="card">
    <app-page-header [title]="isEdit() ? 'Editar Meta Nutricional' : 'Nova Meta Nutricional'"></app-page-header>

    <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-1 md:col-span-2 flex flex-col gap-1">
            <label class="font-medium text-sm">Data (opcional)</label>
            <p-datepicker formControlName="data" dateFormat="dd/mm/yy"
                          placeholder="Selecione a data" styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Meta de Calorias (kcal) *</label>
            <p-inputnumber formControlName="meta_calorias"
                           [min]="0" [max]="10000" placeholder="Ex: 2000"
                           styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Meta de Proteínas (g) *</label>
            <p-inputnumber formControlName="meta_proteinas"
                           [min]="0" [max]="1000" placeholder="Ex: 150"
                           styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Meta de Carboidratos (g) *</label>
            <p-inputnumber formControlName="meta_carboidratos"
                           [min]="0" [max]="2000" placeholder="Ex: 250"
                           styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Meta de Gorduras (g) *</label>
            <p-inputnumber formControlName="meta_gorduras"
                           [min]="0" [max]="500" placeholder="Ex: 70"
                           styleClass="w-full" />
        </div>
    </form>
</div>

<p-confirmDialog></p-confirmDialog>
