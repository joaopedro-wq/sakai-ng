<div class="card">
    <app-page-header title="Dietas"></app-page-header>

    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="15"
             styleClass="p-datatable-sm" [rowHover]="true">
        <ng-template pTemplate="header">
            <tr>
                <th>Descrição</th>
                <th class="text-center w-40">Refeição</th>
                <th>Alimentos</th>
                <th class="text-center w-20">Ações</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
            <tr>
                <td class="font-medium">{{ item.descricao }}</td>
                <td class="text-center">{{ item.descricao_refeicao ?? '—' }}</td>
                <td>
                    <div class="flex flex-wrap gap-1">
                        @for (alimento of item.alimentos?.slice(0, 4); track alimento.id) {
                            <span class="food-chip">{{ alimento.descricao }}</span>
                        }
                        @if (item.alimentos?.length > 4) {
                            <span class="food-chip">+{{ item.alimentos.length - 4 }}</span>
                        }
                    </div>
                </td>
                <td class="text-center">
                    <button pButton icon="pi pi-pencil"
                            class="p-button-sm p-button-text p-button-rounded"
                            [routerLink]="['/dietas/registro', item.id]"></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="4" class="text-center py-8 text-muted-color">
                    Nenhuma dieta cadastrada.
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
