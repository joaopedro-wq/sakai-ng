<div class="card">
    <app-page-header [title]="isEdit() ? 'Editar Dieta' : 'Nova Dieta'"></app-page-header>

    <form [formGroup]="form" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Descrição *</label>
            <input pInputText formControlName="descricao"
                   placeholder="Ex: Dieta Low Carb" class="w-full" />
            @if (form.get('descricao')?.invalid && form.get('descricao')?.touched) {
                <small class="text-red-500">Descrição é obrigatória.</small>
            }
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Refeição *</label>
            <p-select formControlName="id_refeicao"
                      [options]="refeicoes()"
                      optionLabel="descricao"
                      optionValue="id"
                      placeholder="Selecione a refeição"
                      styleClass="w-full" />
            @if (form.get('id_refeicao')?.invalid && form.get('id_refeicao')?.touched) {
                <small class="text-red-500">Refeição é obrigatória.</small>
            }
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Alimentos</label>
            <p-multiselect [options]="todosAlimentos()"
                           [(ngModel)]="selectedAlimentos"
                           [ngModelOptions]="{ standalone: true }"
                           optionLabel="descricao"
                           placeholder="Selecione os alimentos"
                           [filter]="true"
                           filterPlaceholder="Buscar alimento..."
                           (onChange)="onAlimentoChange()"
                           styleClass="w-full" />
        </div>
    </form>

    <app-alimento-qtd-list
        [alimentos]="selectedAlimentos"
        [qtdFn]="getQtd"
        (qtdChange)="onQtdChange($event)">
    </app-alimento-qtd-list>
</div>

<p-confirmDialog></p-confirmDialog>
