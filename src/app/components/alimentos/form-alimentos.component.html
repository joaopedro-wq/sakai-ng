<div class="card">
    <app-page-header [title]="isEdit() ? 'Editar Alimento' : 'Novo Alimento'"></app-page-header>

    <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-1 md:col-span-2 flex flex-col gap-1">
            <label class="font-medium text-sm">Descrição *</label>
            <input pInputText formControlName="descricao" placeholder="Nome do alimento" class="w-full" />
            @if (form.get('descricao')?.invalid && form.get('descricao')?.touched) {
                <small class="text-red-500">Descrição é obrigatória.</small>
            }
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Proteína (g) *</label>
            <p-inputnumber formControlName="proteina"
                           [minFractionDigits]="1" [maxFractionDigits]="2" [min]="0"
                           styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Gordura (g) *</label>
            <p-inputnumber formControlName="gordura"
                           [minFractionDigits]="1" [maxFractionDigits]="2" [min]="0"
                           styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Carboidratos (g) *</label>
            <p-inputnumber formControlName="carbo"
                           [minFractionDigits]="1" [maxFractionDigits]="2" [min]="0"
                           styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Calorias (kcal) *</label>
            <p-inputnumber formControlName="caloria"
                           [minFractionDigits]="1" [maxFractionDigits]="2" [min]="0"
                           styleClass="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Quantidade padrão (g) *</label>
            <p-inputnumber formControlName="qtd"
                           [minFractionDigits]="0" [maxFractionDigits]="2" [min]="0"
                           styleClass="w-full" />
        </div>
    </form>
</div>

<p-confirmDialog></p-confirmDialog>
