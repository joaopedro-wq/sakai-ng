<app-floating-configurator />

<div class="auth-screen flex min-h-svh w-full items-center justify-center px-4 py-10 sm:py-14">

    <div class="flex w-full flex-col items-center gap-5">

        <!-- Card wrapper: 1 px border gradient -->
        <div class="auth-card-outer w-full rounded-3xl p-px transition-shadow duration-300"
             [style.maxWidth]="maxWidth()">

            <!-- Card surface -->
            <div class="auth-card-inner w-full rounded-[23px] px-7 sm:px-12"
                 [ngClass]="paddingY()">

                <!-- Header -->
                <header class="mb-8 flex flex-col items-center text-center"
                        role="banner" aria-label="Vitality Plus">

                    <!-- Icon badge: squircle (radius alto mas nao full) -->
                    <div class="auth-logo mb-5 flex h-15 w-15 items-center justify-center rounded-[22px] sm:h-[60px] sm:w-[60px] sm:rounded-[26px]">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"
                             class="h-9 w-9 sm:h-10 sm:w-10">
                            <!-- Coração -->
                            <path d="M24 40s-16-10-16-22a10 10 0 0 1 16-8 10 10 0 0 1 16 8c0 12-16 22-16 22z"
                                  fill="white" opacity="0.92" />
                            <!-- ECG line -->
                            <path d="M10 26h5l2-4 3 8 2-6 2 3h4"
                                  stroke="var(--primary-color)" stroke-width="1.8"
                                  stroke-linecap="round" stroke-linejoin="round" fill="none" />
                        </svg>
                    </div>

                    <!-- Título -->
                    <h1 class="auth-title m-0 text-2xl font-bold leading-tight tracking-tight sm:text-[1.85rem]">
                        Vitality&nbsp;<span class="text-[var(--primary-color)]">Plus</span>
                    </h1>

                    @if (subtitle()) {
                        <p class="mt-2 text-sm text-[var(--text-color-secondary)]">{{ subtitle() }}</p>
                    }

                    @if (hint()) {
                        <p class="mt-3 max-w-xs text-xs leading-relaxed text-[var(--text-color-secondary)] opacity-75">{{ hint() }}</p>
                    }

                </header>

                <!-- Conteúdo projetado (formulário) -->
                <ng-content />

            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-xs text-[var(--text-color-secondary)] opacity-40"
                role="contentinfo">
            &copy;&nbsp;{{ currentYear }}&nbsp;Vitality Plus &middot; Todos os direitos reservados
        </footer>

    </div>
</div>
