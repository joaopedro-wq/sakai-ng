<div class="card">
    <app-page-header title="Metas Nutricionais"></app-page-header>

    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="15"
             styleClass="p-datatable-sm" [rowHover]="true">
        <ng-template pTemplate="header">
            <tr>
                <th class="w-36">Data</th>
                <th class="text-center">Calorias (kcal)</th>
                <th class="text-center">Proteínas (g)</th>
                <th class="text-center">Carboidratos (g)</th>
                <th class="text-center">Gorduras (g)</th>
                <th class="text-center w-20">Ações</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
            <tr>
                <td>{{ item.data ? (item.data | date: 'dd/MM/yyyy') : '—' }}</td>
                <td class="text-center">
                    <span class="badge-nutrient badge-calorie">{{ item.meta_calorias }}</span>
                </td>
                <td class="text-center">
                    <span class="badge-nutrient badge-protein">{{ item.meta_proteinas }}</span>
                </td>
                <td class="text-center">
                    <span class="badge-nutrient badge-carb">{{ item.meta_carboidratos }}</span>
                </td>
                <td class="text-center">
                    <span class="badge-nutrient badge-fat">{{ item.meta_gorduras }}</span>
                </td>
                <td class="text-center">
                    <button pButton icon="pi pi-pencil"
                            class="p-button-sm p-button-text p-button-rounded"
                            [routerLink]="['/metas/registro', item.id]"></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="6" class="text-center py-8 text-muted-color">
                    Nenhuma meta cadastrada.
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
