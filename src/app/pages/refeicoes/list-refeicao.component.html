<div class="card">
    <app-page-header title="Refeições"></app-page-header>

    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="15"
             styleClass="p-datatable-sm" [rowHover]="true">
        <ng-template pTemplate="header">
            <tr>
                <th>Descrição</th>
                <th class="text-center w-36">Horário</th>
                <th class="text-center w-20">Ações</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
            <tr>
                <td>{{ item.descricao }}</td>
                <td class="text-center">{{ item.horario ?? '—' }}</td>
                <td class="text-center">
                    <button pButton icon="pi pi-pencil"
                            class="p-button-sm p-button-text p-button-rounded"
                            [routerLink]="['/refeicoes/registro', item.id]"></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center py-8 text-muted-color">
                    Nenhuma refeição cadastrada.
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
